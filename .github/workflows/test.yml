name: Gunluk Altin Takip Botu
on:
  schedule:
    # Bu satır Türkiye saatiyle her sabah 05:00'te çalıştırır (02:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # Bu satır sayesinde "Run workflow" butonu da kaybolmaz

jobs:
  deneme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Kutuphaneyi Yukle
        run: pip install requests
      - name: Kodu Calistir
        run: python main.py
